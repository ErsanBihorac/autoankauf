<div #sellNow class="wrapper" id="sellNow">
  <form action="" class="form">
    <div class="form_pair">
      <span>Von welcher Marke ist dein Auto?</span>
      <app-dropdown [options]="carMakes" (selectedArrayIndex)="setCarModel($event)"></app-dropdown>
    </div>

    <div class="form_pair">
      <span>Welches Modell?</span>
      <app-dropdown [options]="carModels" [disabled]="carModels.length === 0" (selectedArrayIndex)="setCarGeneration($event)"></app-dropdown>
    </div>

    <div class="form_pair">
      <span>Welches Generation</span>
      <app-dropdown [options]="carGenerations" [disabled]="carGenerations.length === 0" (selectedArrayIndex)="setCarSeries($event)"></app-dropdown>
    </div>

    <div class="form_pair">
      <span>Welches Serie</span>
      <app-dropdown [options]="carSeries" [disabled]="carSeries.length === 0" (selectedArrayIndex)="setCarTrims($event)"></app-dropdown>
    </div>

    <div class="form_pair">
      <span>Welches Trim</span>
      <app-dropdown [options]="carTrims" [disabled]="carTrims.length === 0" (selectedArrayIndex)="setCarTrimIndex($event)"></app-dropdown>
    </div>

    <div class="form_pair">
      <span>Welcher Kraftstoff?</span>
      <div class="form_options">
        <label class="form_option" *ngFor="let fuel of fuelOptions">
          <input type="radio" name="fuelType" [value]="fuel" [(ngModel)]="fuelType" />
          <span>{{ fuel }}</span>
        </label>
      </div>
    </div>

    <div class="form_pair">
      <span>Wie ist der Kilometerstand?</span>
      <input type="text" placeholder="000..." name="mileage" [(ngModel)]="mileage" maxlength="6" inputmode="numeric" />
    </div>

    <div class="form_pair">
      <span>Wie lautet die Fahrgestelltnummer?</span>
      <input type="text" placeholder="000..." name="vin" [(ngModel)]="vin" maxlength="17" inputmode="numeric" />
    </div>

    <div class="form_pair">
      <span>Dein Name:</span>
      <input type="text" placeholder="Max" name="customerName" [(ngModel)]="customerName" />
    </div>

    <div class="form_pair">
      <span>Deine E-Mail Adresse</span>
      <input type="email" placeholder="mustermann@gmail.com" name="email" [(ngModel)]="customerMail" />
    </div>

    <button
      type="button"
      class="form_submit"
      [disabled]="!canSubmit || submitted"
      (click)="submit()"
    >
      {{ submitted ? 'Anfrage gesendet!' : 'Anfrage senden' }}
    </button>
  </form>
</div>
